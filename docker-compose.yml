# UKMFolio (SmartCollab) — production-ready compose stack.
#
# Quick start:
#   1. Copy .env.docker.example to .env.docker, fill in AUTH_SECRET + GEMINI_API_KEY
#   2. docker compose up -d --build
#   3. Browse http://localhost:3000
#
# To wipe everything and start fresh:
#   docker compose down -v
#
# The MySQL data volume persists across `docker compose down`. Only `-v`
# (or removing the volume manually) deletes it.

services:
  # ---------------------------------------------------------------------------
  # MySQL — application database
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ukm_lms_new}
      MYSQL_USER: ${MYSQL_USER:-ukm}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ukmpass}
    # MySQL 8.4 made caching_sha2_password the default and removed the
    # `--default-authentication-plugin` flag, so we only override charsets.
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    ports:
      # Expose 3307 on the host so it doesn't clash with XAMPP's 3306.
      # Tools like MySQL Workbench can still connect at localhost:3307.
      - "127.0.0.1:3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---------------------------------------------------------------------------
  # Next.js app — built from the local Dockerfile
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      # Inside the compose network the DB is reachable at hostname `db`.
      DATABASE_URL: "mysql://${MYSQL_USER:-ukm}:${MYSQL_PASSWORD:-ukmpass}@db:3306/${MYSQL_DATABASE:-ukm_lms_new}"
      # NEXTAUTH_URL is intentionally NOT set here — leaving it lets the value
      # from .env.docker take effect. Defining it in `environment:` causes the
      # ${VAR:-fallback} substitution to read from the SHELL env at compose-up
      # time, which on the droplet is empty → falls back to localhost.
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    expose:
      - "3000"
    volumes:
      # Persist user-uploaded files (avatars, chat attachments, bulletins,
      # folio images) across rebuilds.
      - app_uploads:/app/public/uploads

  # ---------------------------------------------------------------------------
  # phpMyAdmin — fronted by Caddy at https://phpmyadmin.smartcollab.me.
  # Internal-only (no `ports:` block) — Caddy reaches it via the compose
  # network. Log in with the MySQL root password from .env.docker.
  # ---------------------------------------------------------------------------
  pma:
    image: phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      # Trust Caddy's X-Forwarded-* headers so phpMyAdmin emits correct
      # HTTPS URLs in its forms / redirects.
      PMA_ABSOLUTE_URI: https://phpmyadmin.smartcollab.me/
      UPLOAD_LIMIT: 30M
    expose:
      - "80"

  # ---------------------------------------------------------------------------
  # Caddy — HTTPS reverse proxy with automatic Let's Encrypt certificates
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # caddy_data holds the issued certs + ACME account state. NEVER delete
      # this volume without rate-limit awareness: Let's Encrypt caps issuance.
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  app_uploads:
  caddy_data:
  caddy_config:
